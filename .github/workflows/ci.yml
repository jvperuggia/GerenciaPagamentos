name: Node.js CI

on:
  workflow_dispatch: # execução manual
  push:
    branches:
      - main # execução automática em push na main
  pull_request:
    branches:
      - main # execução automática em PRs para main
  schedule:
    # Cronograma de execução
    #1- minuto, 2 - hora, 3 - dia do mes, 4 - mês,
    - cron: '*/15 * * * 2,3,6'    

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    # runs-on: self-hosted # usar o runner próprio

    strategy:
      matrix:
        node-version: [23.x] # versões do Node que você quer testar

    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # cache de dependências (npm)
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # instalar dependências
      - name: Instalar dependências
        run: npm install

      - name: Rodar testes com mochawesome
        run: npm test

      - name: Consolidar relatórios JSON
        if: ${{ always() }}
        run: npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json

      - name: Gerar relatório HTML consolidado
        if: ${{ always() }}
        run: npx marge mochawesome-report/merged.json --reportDir mochawesome-report --reportFilename index  

      - name: Upload do relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: Relatório de Testes Mocha
      - name: Adicionar resumo no GitHub Actions
        if: ${{ always() }}
        run: |
          passed=$(jq '.stats.passes' mochawesome-report/merged.json)
          failed=$(jq '.stats.failures' mochawesome-report/merged.json)
          total=$(jq '.stats.tests' mochawesome-report/merged.json)

          echo "## 🧪 Resumo dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "- Total de testes: $total" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Passaram: $passed" >> $GITHUB_STEP_SUMMARY
          echo "- ❌ Falharam: $failed" >> $GITHUB_STEP_SUMMARY
          echo "- 📂 Relatório consolidado disponível como artefato: **Relatório Consolidado Mocha**" >> $GITHUB_STEP_SUMMARY